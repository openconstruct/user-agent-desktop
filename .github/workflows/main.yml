name: Build Umbra Browser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allows manual trigger

jobs:
  build-linux:
    runs-on: ubuntu-22.04  # Use 22.04 for glibc 2.35 compatibility
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install system dependencies
        run: |
          # Add Python 3.12 PPA
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt update
          
          # Install build dependencies
          sudo apt install -y \
            python3.12 \
            python3.12-dev \
            python3.12-venv \
            nodejs \
            npm \
            rpm \
            dpkg-dev \
            git \
            curl \
            wget
          
          # Set Python 3.12 as default
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 1
      
      - name: Install fern.js dependencies
        run: npm install
      
      - name: Run fern.js setup
        run: |
          ./fern.js use
          ./fern.js reset
          ./fern.js import-patches
      
      - name: Bootstrap Firefox build environment
        working-directory: mozilla-release
        run: ./mach bootstrap --no-interactive --application-choice=browser
      
      - name: Configure build
        working-directory: mozilla-release
        run: ./mach configure
      
      - name: Build Umbra
        working-directory: mozilla-release
        run: ./mach build
      
      - name: Create browser package
        working-directory: mozilla-release
        run: ./mach package
      
      - name: Build distribution packages
        run: ./packaging/linux/build.sh
      
      - name: List built packages
        run: ls -lh packaging/out/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: umbra-linux-packages
          path: |
            packaging/out/*.rpm
            packaging/out/*.deb
            packaging/out/*.tar.xz
            packaging/out/*.flatpak
          retention-days: 90
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            packaging/out/*.rpm
            packaging/out/*.deb
            packaging/out/*.tar.xz
            packaging/out/*.flatpak
          body: |
            ## Umbra Browser ${{ github.ref_name }}
            
            Built automatically via GitHub Actions from source.
            
            **Build logs:** [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ### Packages
            - **RPM**: For Fedora, RHEL, openSUSE
            - **DEB**: For Debian, Ubuntu, Linux Mint
            - **tar.xz**: Universal Linux archive
            - **Flatpak**: Cross-distro package
            
            ### Verify Build
            All packages built from commit: ${{ github.sha }}
            
            To build from source yourself, see [BUILD.md](https://github.com/${{ github.repository }}/blob/main/BUILD.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
