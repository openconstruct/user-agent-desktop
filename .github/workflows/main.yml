name: Build Umbra Browser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allows manual trigger

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install all Firefox build dependencies
        run: |
          # Add Python 3.12 PPA
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt update
          
          # Install complete Firefox build toolchain
          sudo apt install -y \
            python3.12 \
            python3.12-dev \
            python3.12-venv \
            python3-pip \
            nodejs \
            npm \
            rpm \
            dpkg-dev \
            git \
            curl \
            wget \
            mercurial \
            build-essential \
            libgtk-3-dev \
            libglib2.0-dev \
            libdbus-glib-1-dev \
            libdbus-1-dev \
            libpulse-dev \
            libasound2-dev \
            libxt-dev \
            libx11-xcb-dev \
            libxrender-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libxfixes-dev \
            libxdamage-dev \
            libxcomposite-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libgdk-pixbuf2.0-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            yasm \
            nasm \
            cargo \
            rustc \
            rust-src \
            clang-14 \
            libclang-14-dev \
            libclang1-14 \
            llvm-14 \
            llvm-14-dev \
            cbindgen \
            libssl-dev \
            libffi-dev \
            zip \
            unzip
          
          # Set Python 3.12 as default
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 1
      
      - name: Debug libclang installation
        run: |
          echo "=== Finding all libclang.so files ==="
          find /usr -name "libclang.so*" 2>/dev/null || echo "No libclang.so files found"
          echo ""
          echo "=== Checking /usr/lib/llvm-14/lib/ ==="
          ls -la /usr/lib/llvm-14/lib/ 2>/dev/null || echo "Directory does not exist"
          echo ""
          echo "=== Checking all llvm directories ==="
          find /usr/lib -type d -name "llvm*" 2>/dev/null || echo "No llvm directories found"
          echo ""
          echo "=== Installed clang packages ==="
          dpkg -l | grep -E "clang|llvm" | grep "^ii"
          echo ""
          echo "=== Checking for libclang*.so in common locations ==="
          ls -la /usr/lib/x86_64-linux-gnu/libclang*.so* 2>/dev/null || echo "Not in x86_64-linux-gnu"
          ls -la /usr/lib/libclang*.so* 2>/dev/null || echo "Not in /usr/lib"
      
      - name: Install bindgen via cargo
        run: cargo install cbindgen bindgen-cli
      
      - name: Install fern.js dependencies
        run: npm install
      
      - name: Run fern.js setup
        run: |
          ./fern.js use
          ./fern.js reset
          ./fern.js import-patches
      
      - name: Configure build
        working-directory: mozilla-release
        env:
          MOZCONFIG: ${{ github.workspace }}/brands/Umbra/mozconfig
          LIBCLANG_PATH: /usr/lib/llvm-14/lib
          LD_LIBRARY_PATH: /usr/lib/llvm-14/lib
        run: python3.12 ./mach configure
      
      - name: Build Umbra
        working-directory: mozilla-release
        env:
          MOZCONFIG: ${{ github.workspace }}/brands/Umbra/mozconfig
          LIBCLANG_PATH: /usr/lib/llvm-14/lib
          LD_LIBRARY_PATH: /usr/lib/llvm-14/lib
        run: python3.12 ./mach build
      
      - name: Create browser package
        working-directory: mozilla-release
        env:
          MOZCONFIG: ${{ github.workspace }}/brands/Umbra/mozconfig
        run: python3.12 ./mach package
      
      - name: Build distribution packages
        run: ./packaging/linux/build.sh
      
      - name: List built packages
        run: ls -lh packaging/out/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: umbra-linux-packages
          path: |
            packaging/out/*.rpm
            packaging/out/*.deb
            packaging/out/*.tar.xz
            packaging/out/*.flatpak
          retention-days: 90
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            packaging/out/*.rpm
            packaging/out/*.deb
            packaging/out/*.tar.xz
            packaging/out/*.flatpak
          body: |
            ## Umbra Browser ${{ github.ref_name }}
            
            **Reproducible build from source** - All packages built automatically via GitHub Actions.
            
            ### Verification
            - **Source commit:** ${{ github.sha }}
            - **Build logs:** [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            All packages are built from the exact source code tagged at this release. You can verify by:
            1. Checking out this tag: `git checkout ${{ github.ref_name }}`
            2. Following the build instructions in the workflow file
            3. Comparing checksums with your local build
            
            ### Packages
            - **RPM**: For Fedora, RHEL, openSUSE
            - **DEB**: For Debian, Ubuntu, Linux Mint
            - **tar.xz**: Universal Linux archive
            - **Flatpak**: Cross-distro package
            
            ### Build from Source
            See [.github/workflows/main.yml](https://github.com/${{ github.repository }}/blob/main/.github/workflows/main.yml) for the exact build process.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
